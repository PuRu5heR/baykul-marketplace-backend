openapi.contact.url=${OPENAPI_CONTACT_URL:https://support.baykul.com}
openapi.license.name=${OPENAPI_LICENSE_NAME:Commercial License}
openapi.license.url=${OPENAPI_LICENSE_URL:https://baykul.com/license}
