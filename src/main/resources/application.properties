server.port=${SERVER_PORT:8080}
spring.application.name=Baykul Web Application

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/baykul}
spring.datasource.username=${DATABASE_USER:baykul_user}
spring.datasource.password=${DATABASE_PASSWORD:baykul_pass}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB

spring.jpa.generate-ddl=false
spring.jpa.show-sql=false
# NOTE: Be sure to replace with validate
spring.jpa.hibernate.ddl-auto=update

jwt.secret.access=${JWT_ACCESS_SECRET:FyGgATxvUgvZNgVvpIqsDvDxuhyHQTxVkBMoP1kXnCke1HJzz2Q70Uavl4tsejgBBzWsuIrIzXVpiWFKNQY+Ng==}
jwt.secret.refresh=${JWT_REFRESH_SECRET:vhvyF6Xx10wco5htwza5AU8NjH4lpTG5Q6zdLz4tpCUSJtHKnFvmoroCct3SxmQ5BtIlf7HDYDfuW6wB3bSecw==}

logging.file.name=log/application.log
spring.main.banner-mode=off
logging.logback.rollingpolicy.clean-history-on-start=true
logging.pattern.console=

openapi.title=Baykul Marketplace API
openapi.description=REST API documentation for Baykul Marketplace Platform
openapi.version=1.0.0
openapi.contact.name=${OPENAPI_CONTACT_NAME:Baykul Support Team}
